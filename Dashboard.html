<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MolderLog - Dashboard Analítico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
    
    <!-- Chart.js y adaptadores -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0/locale/es/index.js"></script>

    <!-- XLSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            background-image: url('fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .tab-btn {
            transition: all 0.3s ease;
            position: relative;
        }
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 3px;
            background-color: #3b82f6;
            transition: width 0.3s ease;
        }
        .tab-btn.active::after {
            width: 100%;
        }
        .tab-btn.active {
            color: #1d4ed8;
            font-weight: 600;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        .loader {
            border-top-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">
    <div id="root" class="flex-grow flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- SUPABASE CLIENT ---
        let supabaseClient;
        if (typeof supabase !== 'undefined' && typeof SUPABASE_URL !== 'undefined' && typeof SUPABASE_KEY !== 'undefined') {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        // --- CHART COMPONENT ---
        const ChartComponent = ({ type, data, options, title }) => {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (!canvasRef.current) return;
                
                const hasData = data?.datasets?.some(ds => ds.data.length > 0);
                if (!hasData) {
                    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
                    const ctx = canvasRef.current.getContext('2d');
                    ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
                    ctx.save();
                    ctx.textAlign = 'center';
                    ctx.fillStyle = '#6b7280';
                    ctx.font = "14px 'Inter', sans-serif";
                    ctx.fillText('No hay datos', canvasRef.current.width / 2, canvasRef.current.height / 2);
                    ctx.restore();
                    return;
                }

                if (chartRef.current) chartRef.current.destroy();

                const ctx = canvasRef.current.getContext('2d');
                chartRef.current = new Chart(ctx, { type, data, options });

                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, [data, options, type]);

            return (
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col h-full transition-transform hover:-translate-y-1 duration-300">
                    <h3 className="text-lg font-bold text-gray-700 mb-4">{title}</h3>
                    <div className="flex-grow relative h-64">
                        <canvas ref={canvasRef}></canvas>
                    </div>
                </div>
            );
        };

        // --- KPI CARD ---
        const KpiCard = ({ title, value, icon, colorClass }) => (
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center space-x-4 transition-transform hover:-translate-y-1 duration-300">
                <div className={`p-4 rounded-xl ${colorClass} bg-opacity-10 text-xl flex-shrink-0`}>
                    <i className={`fas ${icon}`}></i>
                </div>
                <div>
                    <p className="text-sm font-medium text-gray-500 uppercase tracking-wider">{title}</p>
                    <p className="text-3xl font-extrabold text-gray-900 mt-1">{value}</p>
                </div>
            </div>
        );

        // --- APP ---
        const App = () => {
            // Fechas
            const defaultDesde = new Date();
            defaultDesde.setMonth(defaultDesde.getMonth() - 3);
            const strDesde = defaultDesde.toISOString().split('T')[0];
            const strHasta = new Date().toISOString().split('T')[0];

            const [fechaDesde, setFechaDesde] = useState(strDesde);
            const [fechaHasta, setFechaHasta] = useState(strHasta);

            // Filtros
            const [filtroCliente, setFiltroCliente] = useState('');
            const [filtroTransporte, setFiltroTransporte] = useState('');
            const [filtroProducto, setFiltroProducto] = useState('');

            // Datos Crudos
            const [rawDespachos, setRawDespachos] = useState([]);
            const [rawInventario, setRawInventario] = useState([]);
            const [isLoading, setIsLoading] = useState(true);

            // Tabs
            const [currentTab, setCurrentTab] = useState('gerencial'); // gerencial, operativa, inventario

            // Default Chart config
            Chart.defaults.font.family = "'Inter', sans-serif";
            Chart.defaults.plugins.tooltip.backgroundColor = 'rgba(15, 23, 42, 0.9)';
            Chart.defaults.plugins.tooltip.padding = 12;
            Chart.defaults.plugins.tooltip.cornerRadius = 8;
            Chart.defaults.responsive = true;
            Chart.defaults.maintainAspectRatio = false;

            // Fetch Data
            const fetchData = async () => {
                if (!supabaseClient) return;
                setIsLoading(true);
                try {
                    // Fetch Despachos
                    const { data: dData, error: dErr } = await supabaseClient
                        .from('vista_dashboard_despachos_base')
                        .select('*')
                        .gte('Fecha', fechaDesde)
                        .lte('Fecha', fechaHasta)
                        .limit(100000);
                    
                    if (dErr) throw dErr;
                    setRawDespachos(dData || []);

                    // Fetch Inventario (Sin filtro de fechas para ver stock actual total, o se podría limitar, pero es stock)
                    const { data: iData, error: iErr } = await supabaseClient
                        .from('vista_dashboard_inventario_base')
                        .select('*')
                        .limit(50000);
                    
                    if (iErr) throw iErr;
                    setRawInventario(iData || []);
                } catch (err) {
                    console.error("Error fetching data:", err);
                    alert("Error cargando datos. Revisa la consola o asegúrate de haber creado las vistas SQL.");
                } finally {
                    setIsLoading(false);
                }
            };

            // Trigger fetch on date change or mount
            useEffect(() => {
                fetchData();
            }, [fechaDesde, fechaHasta]);

            // --- LISTAS PARA DESPLEGABLES ---
            const listasOptions = useMemo(() => {
                const clientes = new Set();
                const transportes = new Set();
                const productos = new Set();

                rawDespachos.forEach(d => {
                    if (d.Cliente) clientes.add(d.Cliente);
                    if (d.Transporte) transportes.add(d.Transporte);
                    if (d.Molde_SKU) productos.add(d.Molde_SKU);
                });
                rawInventario.forEach(d => {
                    if (d.Cliente) clientes.add(d.Cliente);
                    if (d.Molde_SKU) productos.add(d.Molde_SKU);
                });

                return {
                    clientes: Array.from(clientes).sort(),
                    transportes: Array.from(transportes).sort(),
                    productos: Array.from(productos).sort()
                };
            }, [rawDespachos, rawInventario]);

            // --- FILTRADO DE DATOS EN MEMORIA ---
            const filteredDespachos = useMemo(() => {
                return rawDespachos.filter(d => {
                    if (filtroCliente && d.Cliente !== filtroCliente) return false;
                    if (filtroTransporte && d.Transporte !== filtroTransporte) return false;
                    if (filtroProducto && d.Molde_SKU !== filtroProducto) return false;
                    return true;
                });
            }, [rawDespachos, filtroCliente, filtroTransporte, filtroProducto]);

            const filteredInventario = useMemo(() => {
                return rawInventario.filter(d => {
                    if (filtroCliente && d.Cliente !== filtroCliente) return false;
                    // Ignoramos Transporte para inventario
                    if (filtroProducto && d.Molde_SKU !== filtroProducto) return false;
                    return true;
                });
            }, [rawInventario, filtroCliente, filtroProducto]);

            // --- PROCESAMIENTO GERENCIAL ---
            const kpisGerencial = useMemo(() => {
                const idListas = new Set(filteredDespachos.map(d => d.idLista));
                const totalBultos = filteredDespachos.length; // 1 fila = 1 pallet en la vista
                const totalCantidades = filteredDespachos.reduce((sum, d) => sum + (Number(d.Cantidad) || 0), 0);
                return { viajes: idListas.size, bultos: totalBultos, cantidades: totalCantidades };
            }, [filteredDespachos]);

            const chartEvolucionMensual = useMemo(() => {
                const agrupado = {};
                filteredDespachos.forEach(d => {
                    const mes = d.Fecha.substring(0, 7); // YYYY-MM
                    if (!agrupado[mes]) agrupado[mes] = 0;
                    agrupado[mes] += 1; // 1 bulto
                });
                const labels = Object.keys(agrupado).sort();
                return {
                    labels,
                    datasets: [{
                        label: 'Bultos Despachados',
                        data: labels.map(l => agrupado[l]),
                        borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.2)',
                        fill: true, tension: 0.4
                    }]
                };
            }, [filteredDespachos]);

            const getTop5 = (data, keyGroup, keySum) => {
                const agrupado = {};
                data.forEach(d => {
                    const val = d[keyGroup] || 'N/A';
                    if (!agrupado[val]) agrupado[val] = 0;
                    agrupado[val] += keySum ? (Number(d[keySum]) || 0) : 1;
                });
                return Object.entries(agrupado)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 5);
            };

            const chartTopClientes = useMemo(() => {
                const top = getTop5(filteredDespachos, 'Cliente', null); // by bultos
                return {
                    labels: top.map(t => t[0]),
                    datasets: [{
                        data: top.map(t => t[1]),
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
                    }]
                };
            }, [filteredDespachos]);

            const chartTopTransportes = useMemo(() => {
                // By Viajes (Distinct idLista)
                const agrupado = {};
                filteredDespachos.forEach(d => {
                    const t = d.Transporte || 'N/A';
                    if (!agrupado[t]) agrupado[t] = new Set();
                    agrupado[t].add(d.idLista);
                });
                const top = Object.entries(agrupado).map(([k, v]) => [k, v.size]).sort((a,b)=>b[1]-a[1]).slice(0,5);
                return {
                    labels: top.map(t => t[0]),
                    datasets: [{
                        label: 'Nº Viajes',
                        data: top.map(t => t[1]),
                        backgroundColor: '#10b981',
                        borderRadius: 6
                    }]
                };
            }, [filteredDespachos]);

            // --- PROCESAMIENTO OPERATIVO ---
            const tablaOperativa = useMemo(() => {
                // Agrupar por Transporte, Cliente, Molde -> sum bultos, sum cantidad
                const agrupado = {};
                filteredDespachos.forEach(d => {
                    const key = `${d.Transporte}|${d.Cliente}|${d.Molde_SKU}`;
                    if (!agrupado[key]) {
                        agrupado[key] = {
                            Transporte: d.Transporte, Cliente: d.Cliente, Producto: d.Molde_SKU,
                            Bultos: 0, Cantidad: 0, UltimaFecha: d.Fecha
                        };
                    }
                    agrupado[key].Bultos += 1;
                    agrupado[key].Cantidad += (Number(d.Cantidad) || 0);
                    if (d.Fecha > agrupado[key].UltimaFecha) agrupado[key].UltimaFecha = d.Fecha;
                });
                return Object.values(agrupado).sort((a,b) => b.Bultos - a.Bultos);
            }, [filteredDespachos]);

            const chartLineaTiempoTransporte = useMemo(() => {
                // Si no hay filtro de transporte, mostramos los top 3 o 5 para no saturar
                let transportesAMostrar = [];
                if (filtroTransporte) {
                    transportesAMostrar = [filtroTransporte];
                } else {
                    const top = getTop5(filteredDespachos, 'Transporte', null);
                    transportesAMostrar = top.slice(0,3).map(t=>t[0]);
                }

                const datasets = transportesAMostrar.map((transp, i) => {
                    const tData = filteredDespachos.filter(d => d.Transporte === transp);
                    const porFecha = {};
                    tData.forEach(d => {
                        const f = d.Fecha;
                        if (!porFecha[f]) porFecha[f] = new Set();
                        porFecha[f].add(d.idLista);
                    });
                    
                    // Asegurar orden
                    const fKeys = Object.keys(porFecha).sort();
                    
                    const colors = ['#f97316', '#3b82f6', '#8b5cf6', '#10b981', '#ef4444'];
                    return {
                        label: transp,
                        data: fKeys.map(k => ({ x: k, y: porFecha[k].size })),
                        borderColor: colors[i % colors.length],
                        backgroundColor: colors[i % colors.length],
                        tension: 0.2
                    };
                });

                return { datasets };
            }, [filteredDespachos, filtroTransporte]);


            // --- PROCESAMIENTO INVENTARIO ---
            const kpisInventario = useMemo(() => {
                const totalBultos = filteredInventario.length;
                const totalCantidades = filteredInventario.reduce((sum, d) => sum + (Number(d.Cantidad) || 0), 0);
                return { bultos: totalBultos, cantidades: totalCantidades };
            }, [filteredInventario]);

            const tablaInventario = useMemo(() => {
                const agrupado = {};
                filteredInventario.forEach(d => {
                    const key = `${d.Cliente}|${d.Molde_SKU}`;
                    if (!agrupado[key]) {
                        agrupado[key] = { Cliente: d.Cliente, Producto: d.Molde_SKU, Bultos: 0, Cantidad: 0 };
                    }
                    agrupado[key].Bultos += 1;
                    agrupado[key].Cantidad += (Number(d.Cantidad) || 0);
                });
                return Object.values(agrupado).sort((a,b) => b.Bultos - a.Bultos);
            }, [filteredInventario]);


            const handleLimpiarFiltros = () => {
                setFiltroCliente('');
                setFiltroTransporte('');
                setFiltroProducto('');
            };

            const formatter = new Intl.NumberFormat('es-AR');

            return (
                <div className="flex-grow flex flex-col p-4 md:p-6 pb-20 max-w-7xl mx-auto w-full">
                    
                    {/* Header Principal */}
                    <div className="glass-panel p-6 rounded-3xl mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h1 className="text-3xl font-extrabold text-gray-800 tracking-tight">Dashboard Logístico</h1>
                            <p className="text-gray-500 font-medium mt-1">Análisis integral de Despachos e Inventario</p>
                        </div>
                        <div className="flex gap-3">
                            <a href="grillaqr.html" className="bg-white text-gray-700 border border-gray-200 px-4 py-2 rounded-xl font-semibold shadow-sm hover:bg-gray-50 transition"><i className="fas fa-qrcode mr-2"></i> Trazabilidad</a>
                            <a href="index.html" className="bg-gray-800 text-white px-4 py-2 rounded-xl font-semibold shadow-sm hover:bg-gray-700 transition"><i className="fas fa-home mr-2"></i> Inicio</a>
                        </div>
                    </div>

                    {/* Barra de Filtros Globales */}
                    <div className="glass-panel p-4 rounded-2xl mb-6 flex flex-wrap items-end gap-4 shadow-sm z-10 relative">
                        <div className="flex-1 min-w-[140px]">
                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Desde</label>
                            <input type="date" value={fechaDesde} onChange={e => setFechaDesde(e.target.value)} className="w-full rounded-xl border-gray-200 shadow-sm px-3 py-2 bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium"/>
                        </div>
                        <div className="flex-1 min-w-[140px]">
                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Hasta</label>
                            <input type="date" value={fechaHasta} onChange={e => setFechaHasta(e.target.value)} className="w-full rounded-xl border-gray-200 shadow-sm px-3 py-2 bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium"/>
                        </div>
                        <div className="flex-1 min-w-[180px]">
                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Cliente</label>
                            <select value={filtroCliente} onChange={e => setFiltroCliente(e.target.value)} className="w-full rounded-xl border-gray-200 shadow-sm px-3 py-2 bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium">
                                <option value="">Todos los clientes</option>
                                {listasOptions.clientes.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        <div className="flex-1 min-w-[180px]">
                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Producto (SKU)</label>
                            <select value={filtroProducto} onChange={e => setFiltroProducto(e.target.value)} className="w-full rounded-xl border-gray-200 shadow-sm px-3 py-2 bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium">
                                <option value="">Todos los productos</option>
                                {listasOptions.productos.map(p => <option key={p} value={p}>{p}</option>)}
                            </select>
                        </div>
                        <div className={`flex-1 min-w-[180px] transition-opacity ${currentTab === 'inventario' ? 'opacity-40 pointer-events-none' : ''}`}>
                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Transporte</label>
                            <select value={filtroTransporte} onChange={e => setFiltroTransporte(e.target.value)} className="w-full rounded-xl border-gray-200 shadow-sm px-3 py-2 bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium">
                                <option value="">Todos los transportes</option>
                                {listasOptions.transportes.map(t => <option key={t} value={t}>{t}</option>)}
                            </select>
                        </div>
                        <div className="w-full md:w-auto mt-2 md:mt-0">
                            <button onClick={handleLimpiarFiltros} className="w-full md:w-auto bg-red-50 text-red-600 px-4 py-2 rounded-xl font-semibold hover:bg-red-100 transition border border-red-200 text-sm">
                                <i className="fas fa-eraser mr-1"></i> Limpiar Filtros
                            </button>
                        </div>
                    </div>

                    {/* Loading Overlay */}
                    {isLoading && (
                        <div className="fixed inset-0 bg-white bg-opacity-80 backdrop-blur-sm z-50 flex items-center justify-center">
                            <div className="flex flex-col items-center">
                                <div className="loader border-4 border-gray-200 rounded-full w-12 h-12 mb-4"></div>
                                <p className="text-lg font-semibold text-gray-600">Sincronizando información...</p>
                            </div>
                        </div>
                    )}

                    {/* Pestañas */}
                    <div className="flex space-x-6 border-b border-gray-300 mb-6 px-2 overflow-x-auto glass-panel rounded-t-2xl pt-2">
                        <button onClick={() => setCurrentTab('gerencial')} className={`tab-btn px-4 py-3 text-sm uppercase tracking-wider font-medium text-gray-500 hover:text-gray-800 ${currentTab==='gerencial'?'active':''}`}>
                            <i className="fas fa-chart-pie mr-2"></i> Vista Gerencial
                        </button>
                        <button onClick={() => setCurrentTab('operativa')} className={`tab-btn px-4 py-3 text-sm uppercase tracking-wider font-medium text-gray-500 hover:text-gray-800 ${currentTab==='operativa'?'active':''}`}>
                            <i className="fas fa-truck-loading mr-2"></i> Trazabilidad Operativa
                        </button>
                        <button onClick={() => setCurrentTab('inventario')} className={`tab-btn px-4 py-3 text-sm uppercase tracking-wider font-medium text-gray-500 hover:text-gray-800 ${currentTab==='inventario'?'active':''}`}>
                            <i className="fas fa-boxes-stacked mr-2"></i> Inventario Actual
                        </button>
                    </div>

                    {/* --- CONTENIDO VISTA GERENCIAL --- */}
                    {currentTab === 'gerencial' && (
                        <div className="space-y-6 fade-in">
                            {/* KPIs */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <KpiCard title="Viajes Totales" value={formatter.format(kpisGerencial.viajes)} icon="fa-truck" colorClass="text-blue-600 bg-blue-100" />
                                <KpiCard title="Bultos Despachados" value={formatter.format(kpisGerencial.bultos)} icon="fa-pallet" colorClass="text-amber-600 bg-amber-100" />
                                <KpiCard title="Cantidades" value={formatter.format(kpisGerencial.cantidades)} icon="fa-cubes" colorClass="text-emerald-600 bg-emerald-100" />
                            </div>

                            {/* Charts Row 1 */}
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="lg:col-span-2">
                                    <ChartComponent 
                                        type="line" 
                                        title="Evolución de Bultos" 
                                        data={chartEvolucionMensual} 
                                        options={{ scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } }} 
                                    />
                                </div>
                                <div className="lg:col-span-1">
                                    <ChartComponent 
                                        type="doughnut" 
                                        title="Top 5 Clientes (Bultos)" 
                                        data={chartTopClientes} 
                                        options={{ plugins: { legend: { position: 'bottom' } }, cutout: '65%' }} 
                                    />
                                </div>
                            </div>
                            
                            {/* Charts Row 2 */}
                            <div className="grid grid-cols-1 gap-6">
                                <ChartComponent 
                                    type="bar" 
                                    title="Top Transportes (Por Nº de Viajes)" 
                                    data={chartTopTransportes} 
                                    options={{ indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true } } }} 
                                />
                            </div>
                        </div>
                    )}

                    {/* --- CONTENIDO VISTA OPERATIVA --- */}
                    {currentTab === 'operativa' && (
                        <div className="space-y-6 fade-in">
                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                                <h3 className="text-lg font-bold text-gray-700 mb-1">Línea de Tiempo de Viajes por Transporte</h3>
                                <p className="text-sm text-gray-500 mb-4">Muestra los picos de actividad (viajes diarios) de los transportes. {filtroTransporte ? '' : 'Mostrando el Top 3 por defecto.'}</p>
                                <div className="h-72">
                                    <ChartComponent 
                                        type="line" 
                                        title="" 
                                        data={chartLineaTiempoTransporte} 
                                        options={{
                                            scales: {
                                                x: { type: 'time', time: { unit: 'day', displayFormats: { day: 'dd MMM' } }, title: { display: true, text: 'Fecha' } },
                                                y: { beginAtZero: true, title: { display: true, text: 'Nº de Viajes' } }
                                            },
                                            plugins: { legend: { position: 'top' } }
                                        }} 
                                    />
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                <div className="p-5 border-b border-gray-100 flex justify-between items-center">
                                    <h3 className="text-lg font-bold text-gray-700">Trazabilidad Detallada</h3>
                                    <span className="bg-blue-50 text-blue-700 text-xs font-bold px-3 py-1 rounded-full">{tablaOperativa.length} registros (agrupados)</span>
                                </div>
                                <div className="overflow-x-auto max-h-[500px]">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-gray-50 sticky top-0 shadow-sm">
                                            <tr>
                                                <th className="py-3 px-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Transporte</th>
                                                <th className="py-3 px-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Cliente</th>
                                                <th className="py-3 px-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Producto (Molde)</th>
                                                <th className="py-3 px-4 text-xs font-bold text-gray-500 uppercase tracking-wider text-right">Bultos</th>
                                                <th className="py-3 px-4 text-xs font-bold text-gray-500 uppercase tracking-wider text-right">Cantidad</th>
                                                <th className="py-3 px-4 text-xs font-bold text-gray-500 uppercase tracking-wider text-right">Último Despacho</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {tablaOperativa.map((row, i) => (
                                                <tr key={i} className="hover:bg-gray-50 transition-colors">
                                                    <td className="py-3 px-4 text-sm font-medium text-gray-900">{row.Transporte}</td>
                                                    <td className="py-3 px-4 text-sm text-gray-600">{row.Cliente}</td>
                                                    <td className="py-3 px-4 text-sm text-gray-600"><span className="bg-gray-100 px-2 py-1 rounded-md text-xs font-mono">{row.Producto}</span></td>
                                                    <td className="py-3 px-4 text-sm font-bold text-gray-800 text-right">{formatter.format(row.Bultos)}</td>
                                                    <td className="py-3 px-4 text-sm text-gray-600 text-right">{formatter.format(row.Cantidad)}</td>
                                                    <td className="py-3 px-4 text-sm text-gray-500 text-right">{row.UltimaFecha}</td>
                                                </tr>
                                            ))}
                                            {tablaOperativa.length === 0 && (
                                                <tr><td colSpan="6" className="py-8 text-center text-gray-400">No hay datos que coincidan con los filtros.</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- CONTENIDO VISTA INVENTARIO --- */}
                    {currentTab === 'inventario' && (
                        <div className="space-y-6 fade-in">
                            <div className="bg-blue-50 border border-blue-200 text-blue-800 p-4 rounded-xl flex items-start gap-3 shadow-sm">
                                <i className="fas fa-info-circle mt-1"></i>
                                <div>
                                    <p className="font-semibold text-sm">Información de Stock Actual</p>
                                    <p className="text-xs mt-1">Los filtros de Transporte y Fecha (arriba) no aplican a esta vista. Solo se muestran los pallets actualmente marcados en stock filtrados por Cliente y Producto.</p>
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <KpiCard title="Bultos Totales en Stock" value={formatter.format(kpisInventario.bultos)} icon="fa-boxes-stacked" colorClass="text-emerald-600 bg-emerald-100" />
                                <KpiCard title="Cantidades en Stock" value={formatter.format(kpisInventario.cantidades)} icon="fa-box-open" colorClass="text-teal-600 bg-teal-100" />
                            </div>

                            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                <div className="p-5 border-b border-gray-100">
                                    <h3 className="text-lg font-bold text-gray-700">Detalle de Stock por Molde</h3>
                                </div>
                                <div className="overflow-x-auto max-h-[500px]">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-gray-50 sticky top-0 shadow-sm">
                                            <tr>
                                                <th className="py-3 px-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Cliente</th>
                                                <th className="py-3 px-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Producto (Molde)</th>
                                                <th className="py-3 px-4 text-xs font-bold text-gray-500 uppercase tracking-wider text-right">Bultos</th>
                                                <th className="py-3 px-4 text-xs font-bold text-gray-500 uppercase tracking-wider text-right">Cantidad Total</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {tablaInventario.map((row, i) => (
                                                <tr key={i} className="hover:bg-gray-50 transition-colors">
                                                    <td className="py-3 px-4 text-sm font-medium text-gray-900">{row.Cliente}</td>
                                                    <td className="py-3 px-4 text-sm text-gray-600"><span className="bg-gray-100 px-2 py-1 rounded-md text-xs font-mono">{row.Producto}</span></td>
                                                    <td className="py-3 px-4 text-sm font-bold text-emerald-600 text-right">{formatter.format(row.Bultos)}</td>
                                                    <td className="py-3 px-4 text-sm text-gray-600 text-right">{formatter.format(row.Cantidad)}</td>
                                                </tr>
                                            ))}
                                            {tablaInventario.length === 0 && (
                                                <tr><td colSpan="4" className="py-8 text-center text-gray-400">No hay stock para los filtros seleccionados.</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
